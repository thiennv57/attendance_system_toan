{% extends "base.html" %}

{% block content %}
<div class="container mt-4" style="max-width: 760px;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">{{ 'Sửa bài kiểm tra' if is_edit_mode else 'Tạo bài kiểm tra' }}</h2>
        <a href="{{ url_for('test_management') }}" class="btn btn-secondary"><i class="fas fa-arrow-left me-1"></i>Quay lại</a>
    </div>

    <div class="card">
        <div class="card-body">
            <form method="POST">
                <div class="mb-3">
                    <label for="title" class="form-label">Tên bài kiểm tra</label>
                    <input type="text" id="title" name="title" class="form-control" value="{{ exam.title if exam else '' }}" required>
                </div>
                <div class="mb-3">
                    <label for="grade" class="form-label">Khối lớp</label>
                    <select id="grade" name="grade" class="form-select" required>
                        <option value="">Chọn khối lớp</option>
                        {% for grade in available_grades %}
                        <option value="{{ grade }}" {% if exam and exam.grade == grade %}selected{% endif %}>{{ grade }}</option>
                        {% endfor %}
                    </select>
                    <div class="form-text">Khi tạo, toàn bộ học sinh của khối này sẽ được thêm sẵn vào 10 lần kiểm tra đầu tiên.</div>
                </div>
                <div class="mb-3">
                    <label for="description" class="form-label">Ghi chú</label>
                    <textarea id="description" name="description" rows="4" class="form-control">{{ exam.description if exam and exam.description else '' }}</textarea>
                </div>
                <button type="submit" class="btn btn-primary">
                    <i class="fas {{ 'fa-floppy-disk' if is_edit_mode else 'fa-circle-plus' }} me-1"></i>{{ 'Lưu thay đổi' if is_edit_mode else 'Tạo bài kiểm tra' }}
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
